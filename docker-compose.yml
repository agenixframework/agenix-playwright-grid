
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=playwrightgrid
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d playwrightgrid"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:9.5.5
    ports:
      - "3000:3000"
    environment:
      - GF_LOG_LEVEL=debug
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped

  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "5100:5000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - REDIS_URL=redis:6379
      - HUB_NODE_SECRET=node-secret
      - HUB_RUNNER_SECRET=runner-secret
      - HUB_RESULTS_BACKEND=postgres
      - HUB_RESULTS_POSTGRES=Host=postgres;Port=5432;Username=postgres;Password=postgres;Database=playwrightgrid
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL http://127.0.0.1:5000/health || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  worker1:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        PLAYWRIGHT_VERSION: ${PLAYWRIGHT_VERSION:-1.54.2}
    ports:
      - "5200:5000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - HUB_URL=http://hub:5000
      - REDIS_URL=redis:6379
      - NODE_ID=worker1
      - NODE_SECRET=node-secret
      - NODE_NODE_SECRET=node-node-secret
      - POOL_CONFIG=AppB:Chromium:UAT=3
      - PUBLIC_WS_HOST=127.0.0.1
      - PUBLIC_WS_PORT=5200
      - PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION:-1.54.2}
      - CHROMIUM_ARGS=--disable-dev-shm-usage --no-sandbox --disable-setuid-sandbox --no-proxy-server --disable-ipv6 --disable-quic --disable-http2 --disable-features=UseDNSHttpsSvcb
    depends_on:
      redis:
        condition: service_healthy
      hub:
        condition: service_healthy
    shm_size: "1gb"
    restart: unless-stopped

  worker2:
      build:
        context: .
        dockerfile: worker/Dockerfile
        args:
          PLAYWRIGHT_VERSION: ${PLAYWRIGHT_VERSION:-1.54.2}
      ports:
        - "5201:5000"
      dns:
        - 1.1.1.1
        - 8.8.8.8
      environment:
        - HUB_URL=http://hub:5000
        - REDIS_URL=redis:6379
        - NODE_ID=worker2
        - NODE_SECRET=node-secret
        - NODE_NODE_SECRET=node-node-secret
        - POOL_CONFIG=AppB:Chromium:UAT=3
        - PUBLIC_WS_HOST=127.0.0.1
        - PUBLIC_WS_PORT=5201
        - PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION:-1.54.2}
        - CHROMIUM_ARGS=--disable-dev-shm-usage --no-sandbox --disable-setuid-sandbox --no-proxy-server --disable-ipv6 --disable-quic --disable-http2 --disable-features=UseDNSHttpsSvcb
      depends_on:
        redis:
          condition: service_healthy
        hub:
          condition: service_healthy
      shm_size: "1gb"
      restart: unless-stopped


  worker3:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        PLAYWRIGHT_VERSION: ${PLAYWRIGHT_VERSION:-1.54.2}
    ports:
      - "5202:5000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - HUB_URL=http://hub:5000
      - REDIS_URL=redis:6379
      - NODE_ID=worker3
      - NODE_SECRET=node-secret
      - NODE_NODE_SECRET=node-node-secret
      - POOL_CONFIG=AppB:Firefox:UAT=2,AppB:Webkit:UAT=2
      - PUBLIC_WS_HOST=127.0.0.1
      - PUBLIC_WS_PORT=5202
      - PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION:-1.54.2}
      - FIREFOX_ARGS=--headless
      - FIREFOX_PREFS={"network.dns.disablePrefetch":true,"browser.cache.disk.enable":false}
    depends_on:
      redis:
        condition: service_healthy
      hub:
        condition: service_healthy
    shm_size: "1gb"
    restart: unless-stopped


  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - HUB_SIGNALR=http://hub:5000/ws
    depends_on:
      - hub
      - grafana
    healthcheck:
      test: [ "CMD", "curl", "-fsSL", "http://127.0.0.1:3001/health" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s


volumes:
  pgdata:
