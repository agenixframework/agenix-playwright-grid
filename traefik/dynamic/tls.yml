# ==============================================================================
# Traefik Dynamic Configuration - TLS
# ==============================================================================
# This file defines TLS options and certificates for HTTPS.
# Hot-reloads automatically when changed.
#
# Apply TLS options to routers using labels:
#   - "traefik.http.routers.hub.tls.options=modern@file"
# ==============================================================================

tls:
  # ============================================================================
  # TLS Options (Security Profiles)
  # ============================================================================

  options:
    # Modern: TLS 1.3 only (most secure, requires modern clients)
    modern:
      minVersion: "VersionTLS13"
      # TLS 1.3 cipher suites are fixed and cannot be configured
      sniStrict: true
      # Note: preferServerCipherSuites is deprecated in Traefik v3.x (ineffective)

    # Intermediate: TLS 1.2+ (balanced security and compatibility)
    intermediate:
      minVersion: "VersionTLS12"
      maxVersion: "VersionTLS13"
      cipherSuites:
        # TLS 1.3 cipher suites (preferred)
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
        # TLS 1.2 cipher suites (fallback for older clients)
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP521
        - CurveP384
        - CurveP256
      sniStrict: false
      # Note: preferServerCipherSuites is deprecated in Traefik v3.x (ineffective)

    # Old: TLS 1.0+ (legacy compatibility, less secure)
    old:
      minVersion: "VersionTLS10"
      maxVersion: "VersionTLS13"
      cipherSuites:
        # Modern ciphers
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
        # Intermediate ciphers
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        # Legacy ciphers (for old clients)
        - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
        - TLS_RSA_WITH_AES_128_GCM_SHA256
        - TLS_RSA_WITH_AES_256_GCM_SHA384
      sniStrict: false
      # Note: preferServerCipherSuites is deprecated in Traefik v3.x (ineffective)

    # Default: Recommended for most deployments
    default:
      minVersion: "VersionTLS12"
      sniStrict: false

  # ============================================================================
  # TLS Stores (Certificate Storage)
  # ============================================================================

  stores:
    default:
      defaultCertificate:
        # Default certificate for services without specific cert
        # certFile: "/certs/default.crt"
        # keyFile: "/certs/default.key"

  # ============================================================================
  # Static Certificates (Manual Certificate Management)
  # ============================================================================

  certificates:
    # Custom certificate for specific domain
    # - certFile: "/certs/hub.your-domain.com.crt"
    #   keyFile: "/certs/hub.your-domain.com.key"
    #   stores:
    #     - default

    # Wildcard certificate (*.your-domain.com)
    # - certFile: "/certs/wildcard.your-domain.com.crt"
    #   keyFile: "/certs/wildcard.your-domain.com.key"
    #   stores:
    #     - default

# ==============================================================================
# Usage Examples
# ==============================================================================

# Example 1: Apply TLS options to a router
# labels:
#   - "traefik.http.routers.hub.tls=true"
#   - "traefik.http.routers.hub.tls.options=modern@file"
#   - "traefik.http.routers.hub.tls.certresolver=letsencrypt"

# Example 2: Use custom certificate
# labels:
#   - "traefik.http.routers.hub.tls=true"
#   - "traefik.http.routers.hub.tls.domains[0].main=hub.your-domain.com"
#   - "traefik.http.routers.hub.tls.domains[0].sans=*.hub.your-domain.com"

# Example 3: Client certificate authentication (mTLS)
# tls:
#   options:
#     mtls:
#       minVersion: "VersionTLS12"
#       clientAuth:
#         caFiles:
#           - "/certs/client-ca.crt"
#         clientAuthType: "RequireAndVerifyClientCert"

# ==============================================================================
# Security Recommendations
# ==============================================================================

# 1. Use TLS 1.2+ (minVersion: VersionTLS12)
# 2. Prefer TLS 1.3 when possible (minVersion: VersionTLS13)
# 3. Enable HSTS (see middleware.yml: security-headers)
# 4. Use strong cipher suites (disable CBC ciphers)
# 5. Enable OCSP stapling (automatic with Let's Encrypt)
# 6. Rotate certificates regularly (automatic with Let's Encrypt)
# 7. Test with: https://www.ssllabs.com/ssltest/

# ==============================================================================
# References
# ==============================================================================

# - Mozilla SSL Configuration Generator: https://ssl-config.mozilla.org/
# - Traefik TLS Documentation: https://doc.traefik.io/traefik/https/tls/
# - Let's Encrypt: https://letsencrypt.org/
