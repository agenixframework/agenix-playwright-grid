name: Build and Publish NuGet Packages and Containers

on:
  push:
    branches:
      - develop
      - release/*
      - hotfix/*
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: "Publish to NuGet?"
        required: true
        type: choice
        options: [ "no", "yes" ]
        default: "no"
      publish_containers:
        description: "Publish container images?"
        required: true
        type: choice
        options: [ "no", "yes" ]
        default: "no"

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write
  security-events: write
  actions: read
  issues: read

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # Build and Test Job
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
      nuget-version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
      is-release: ${{ steps.gitversion.outputs.preReleaseTag == '' }}
      is-prerelease: ${{ steps.gitversion.outputs.preReleaseTag != '' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for GitVersion

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0.10.2
      with:
        versionSpec: '5.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v0.10.2
      with:
        useConfigFile: true
        configFilePath: 'GitVersion.yml'

    - name: Display Version Info
      run: |
        echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
        echo "NuGet Version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"
        echo "Is Release: ${{ steps.gitversion.outputs.preReleaseTag == '' }}"

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: |
        dotnet build --configuration Release --no-restore \
          /p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          /p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
          /p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
          /p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

    - name: Pack NuGet packages
      run: |
        dotnet pack --configuration Release --no-build --output ./artifacts \
          /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }} \
          /p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          /p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
          /p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
          /p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
        retention-days: 30

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    # Only run on push events (merges)
    if: github.event_name == 'push'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Security Scan with Detailed Report
      id: security-scan
      run: |
        echo "🔍 Running security vulnerability scan..."

        # Run vulnerability scan and capture output
        dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.txt

        # Check for different severity levels
        HIGH_VULNS=$(grep -c "High" audit.txt || true)
        MODERATE_VULNS=$(grep -c "Moderate" audit.txt || true)

        echo "high_vulnerabilities=$HIGH_VULNS" >> $GITHUB_OUTPUT
        echo "moderate_vulnerabilities=$MODERATE_VULNS" >> $GITHUB_OUTPUT

        # Report findings
        if [ $HIGH_VULNS -gt 0 ]; then
          echo "❌ Found $HIGH_VULNS HIGH severity vulnerabilities"
          echo "🚨 Build will fail due to high severity issues"
          exit 1
        elif [ $MODERATE_VULNS -gt 0 ]; then
          echo "⚠️ Found $MODERATE_VULNS MODERATE severity vulnerabilities"
          echo "🟡 Consider updating these packages soon"
          # Don't fail build for moderate issues, but warn
        else
          echo "✅ No vulnerabilities detected"
        fi

    - name: Upload Security Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-report
        path: audit.txt
        retention-days: 30

  # Publish to NuGet Job (ONLY runs on merges to protected branches)
  publish-nuget:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_nuget == 'yes') ||
        (github.event_name == 'push' && (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/heads/hotfix/') ||
          startsWith(github.ref, 'refs/tags/v')
        ))
      )

    environment:
      name: ${{ needs.build.outputs.is-release == 'true' && 'production' || 'staging' }}
      url: https://www.nuget.org

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Determine publish settings
      id: publish-settings
      run: |
        if [[ "${{ needs.build.outputs.is-release }}" == "true" ]]; then
          echo "release-type=stable" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          echo "release-type=preview" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/heads/hotfix/* ]]; then
          echo "release-type=hotfix" >> $GITHUB_OUTPUT
        else
          echo "release-type=beta" >> $GITHUB_OUTPUT
        fi

    - name: Validate packages
      run: |
        echo "📦 Packages to be published:"
        ls -la ./artifacts/*.nupkg

        echo "🔍 Package details:"
        for package in ./artifacts/*.nupkg; do
          echo "Package: $(basename $package)"
          dotnet nuget verify "$package" || echo "⚠️ Package verification failed for $package"
        done

    - name: Publish to NuGet
      run: |
        echo "🚀 Publishing ${{ steps.publish-settings.outputs.release-type }} packages..."
        for package in ./artifacts/*.nupkg ./artifacts/*.snupkg; do
          if [[ -f "$package" ]]; then
            echo "Publishing: $(basename $package)"
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          fi
        done

  # Publish Containers to GHCR (mirrors NuGet publish criteria)
  publish-containers:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_containers == 'yes') ||
        (github.event_name == 'push' && (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/heads/hotfix/') ||
          startsWith(github.ref, 'refs/tags/v')
        ))
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push hub
        uses: docker/build-push-action@v6
        with:
          context: ./hub
          file: ./hub/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-hub:${{ needs.build.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-hub:latest
          cache-from: type=gha,scope=hub
          cache-to: type=gha,scope=hub,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-worker:${{ needs.build.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build & push dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-dashboard:${{ needs.build.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

      - name: Generate docker-compose artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "Preparing docker-compose artifact from published images..."
          mkdir -p ./artifacts/compose
          export GHCR_OWNER="${{ github.repository_owner }}"
          export GHCR_REPO="${{ github.event.repository.name }}"
          export IMAGE_TAG="${{ needs.build.outputs.version }}"
          docker compose version || true
          docker compose -f docker-compose.yml -f docker-compose.images.yml config > ./artifacts/compose/docker-compose-${{ needs.build.outputs.version }}.yml
          cp ./artifacts/compose/docker-compose-${{ needs.build.outputs.version }}.yml ./artifacts/compose/docker-compose.yml
          echo "Resolved compose generated at ./artifacts/compose/docker-compose-${{ needs.build.outputs.version }}.yml (and copied as docker-compose.yml)"
          head -n 50 ./artifacts/compose/docker-compose-${{ needs.build.outputs.version }}.yml || true

          echo "Including configuration directories (prometheus, provisioning)"
          if [ -d "./prometheus" ]; then
            cp -R ./prometheus ./artifacts/compose/prometheus
          fi
          if [ -f "./prometheus.yml" ]; then
            # Legacy fallback if a single-file layout is used somewhere
            cp ./prometheus.yml ./artifacts/compose/prometheus.yml
          fi
          if [ -d "./provisioning" ]; then
            cp -R ./provisioning ./artifacts/compose/provisioning
          fi

          echo "Copying source compose files for reference"
          cp docker-compose.yml ./artifacts/compose/_source-docker-compose.yml
          cp docker-compose.images.yml ./artifacts/compose/_source-docker-compose.images.yml

      - name: Upload docker-compose artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-${{ needs.build.outputs.version }}
          path: ./artifacts/compose/
          retention-days: 30

  scan-and-sbom:
    runs-on: ubuntu-latest
    needs: [publish-containers, build]
    if: |
      always() &&
      needs.publish-containers.result == 'success' &&
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/develop' ||
        startsWith(github.ref, 'refs/heads/release/') ||
        startsWith(github.ref, 'refs/heads/hotfix/') ||
        startsWith(github.ref, 'refs/tags/v')
      )
    strategy:
      matrix:
        component: [hub, worker, dashboard]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: vars
        run: echo "image=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.component }}:${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Wait for image to be available and pull it
        run: |
          # Add a short delay to ensure the image is available
          sleep 10

          # Try to pull the image with retries
          max_attempts=5
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts: Pulling ${{ steps.vars.outputs.image }}"

            if docker pull ${{ steps.vars.outputs.image }}; then
              echo "✅ Successfully pulled image"
              break
            else
              echo "⚠️ Failed to pull image, retrying in 10 seconds..."
              sleep 10
              attempt=$((attempt+1))
            fi
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "❌ Failed to pull image after $max_attempts attempts"
            exit 1
          fi

      - name: List available images
        run: docker images

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}
          format: 'sarif'
          output: trivy-${{ matrix.component }}.sarif
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          exit-code: '0'
          scanners: 'vuln'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.component }}.sarif"
          category: "trivy-${{ matrix.component }}"

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: "trivy-sarif-${{ matrix.component }}"
          path: "trivy-${{ matrix.component }}.sarif"
          retention-days: "14"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.vars.outputs.image }}
          format: cyclonedx-json
          upload-artifact: true
          artifact-name: sbom-${{ matrix.component }}

      - name: Trivy SBOM (CycloneDX JSON)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}
          format: 'cyclonedx'
          output: trivy-sbom-${{ matrix.component }}.cdx.json
          exit-code: '0'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Trivy SBOM summary (markdown)
        id: sbom-summary
        shell: bash
        run: |
          FILE="trivy-sbom-${{ matrix.component }}.cdx.json"
          OUT="sbom-summary-${{ matrix.component }}.md"

          echo "# SBOM Summary - ${{ matrix.component }}" > "$OUT"
          echo "" >> "$OUT"
          echo "- Image: ${{ steps.vars.outputs.image }}" >> "$OUT"
          echo "- Components: $(jq -r '(.components // []) | length' "$FILE" 2>/dev/null || echo 0)" >> "$OUT"

          echo "" >> "$OUT"
          echo "## Counts by type" >> "$OUT"
          echo "" >> "$OUT"
          echo "| Type | Count |" >> "$OUT"
          echo "|------|-------|" >> "$OUT"
          jq -r '(.components // []) | sort_by(.type // "unknown") | group_by(.type) | map({k:(.[0].type // "unknown"), c:length}) | .[] | "| \(.k) | \(.c) |"' "$FILE" 2>/dev/null >> "$OUT" || true

          echo "" >> "$OUT"
          echo "## Sample components (first 20)" >> "$OUT"
          echo "" >> "$OUT"
          echo "| Name | Version | Type | License |" >> "$OUT"
          echo "|------|---------|------|---------|" >> "$OUT"
          jq -r '(.components // []) | sort_by(.name) | .[0:20] | .[] | "| \(.name // "-") | \(.version // "-") | \(.type // "-") | \(((.licenses[0].license.id // .licenses[0].license.name) // "-")) |"' "$FILE" 2>/dev/null >> "$OUT" || true

          {
            echo "## SBOM Summary - ${{ matrix.component }}";
            echo "";
            cat "$OUT";
          } >> "$GITHUB_STEP_SUMMARY"

          echo "summary-file=$OUT" >> $GITHUB_OUTPUT

      - name: Upload SBOM summary and JSON
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom-${{ matrix.component }}
          path: |
            trivy-sbom-${{ matrix.component }}.cdx.json
            sbom-summary-${{ matrix.component }}.md
          retention-days: 14

      - name: Comment SBOM summary on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: ${{ steps.sbom-summary.outputs.summary-file }}
          edit-mode: replace

  # Notification Job
  notify:
    runs-on: ubuntu-latest
    needs: [build, publish-nuget, publish-containers, scan-and-sbom]
    if: |
      always() && (
        needs.publish-nuget.result == 'success' || needs.publish-nuget.result == 'failure' ||
        needs.publish-containers.result == 'success' || needs.publish-containers.result == 'failure' ||
        needs.scan-and-sbom.result == 'success' || needs.scan-and-sbom.result == 'failure'
      )

    steps:
      - name: Notify NuGet Publish Result
        if: needs.publish-nuget.result == 'success'
        run: |
          echo "✅ Successfully published NuGet packages!"
          echo "NuGet Version: ${{ needs.build.outputs.nuget-version }}"
          echo "Type: ${{ needs.build.outputs.is-release == 'true' && 'Stable Release' || 'Pre-release' }}"

      - name: Notify NuGet Publish Failure
        if: needs.publish-nuget.result == 'failure'
        run: |
          echo "❌ Failed to publish NuGet packages!"
          echo "NuGet Version: ${{ needs.build.outputs.nuget-version }}"
          exit 1

      - name: Notify Container Publish Result
        if: needs.publish-containers.result == 'success'
        run: |
          echo "✅ Successfully published container images to GHCR!"
          echo "Image tags used: ${{ needs.build.outputs.version }} and latest"

      - name: Notify Container Publish Failure
        if: needs.publish-containers.result == 'failure'
        run: |
          echo "❌ Failed to publish container images to GHCR!"
          exit 1
